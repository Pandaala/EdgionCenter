apiVersion: v1
kind: ConfigMap
metadata:
  name: edgion-center
data:
  config.yaml: |
    server:
      http_addr: 127.0.0.1:12201
      grpc_addr: 0.0.0.0:12251
      probe_addr: 0.0.0.0:12200
      metrics_addr: 0.0.0.0:12290
    sync:
      command_timeout_secs: 30
      ping_interval_secs: 30
    auth:
      enabled: true
      discovery: https://idp.example.invalid/.well-known/openid-configuration
      audiences: [edgion-center-dashboard]
      groups_claim: groups
    grpc_security:
      tls:
        cert: /var/run/edgion-center/tls/tls.crt
        key: /var/run/edgion-center/tls/tls.key
        ca: /var/run/edgion-center/tls/ca.crt
    trust_domain: edgion.io
    lease_duration_secs: 15
    audit_log_reads: false
    internal_forwarding:
      bind_addr: 0.0.0.0:12252
      port: 12252
      server_name: edgion-center-internal.edgion-system.svc
      expected_peer_spiffe_id: spiffe://edgion.io/ns/edgion-system/sa/edgion-center
      max_request_bytes: 4194304
      max_response_bytes: 16777216
      tls:
        cert: /var/run/edgion-center/internal-tls/tls.crt
        key: /var/run/edgion-center/internal-tls/tls.key
        ca: /var/run/edgion-center/internal-tls/ca.crt
    mounted_credentials:
      enabled: true
      root_directory: /var/run/edgion-center/route53-local-keys/private
      revision_key_file: revision.key
      bindings:
        - credential_ref: aws/route53-dns-cursor
          provider_account_id: aws-main
          provider: aws
          purpose: route53_dns_cursor_hmac
          file: route53-dns-cursor.key
        - credential_ref: aws/route53-dns-mutation
          provider_account_id: aws-main
          provider: aws
          purpose: route53_dns_mutation_receipt_hmac
          file: route53-dns-mutation.key
        - credential_ref: aws/route53-zone-lifecycle
          provider_account_id: aws-main
          provider: aws
          purpose: route53_zone_lifecycle_hmac
          file: route53-zone-lifecycle.key
        - credential_ref: aws/cloudfront-fingerprint
          provider_account_id: aws-main
          provider: aws
          purpose: cloud_front_fingerprint_hmac
          file: cloudfront-fingerprint.key
        - credential_ref: aws/waf-owner
          provider_account_id: aws-main
          provider: aws
          purpose: aws_waf_ownership_hmac
          file: aws-waf-owner.key
    route53_dns_read:
      enabled: true
      cursor_key_ref: aws/route53-dns-cursor
      operation_timeout_secs: 60
      global_concurrency: 8
      per_account_concurrency: 2
    route53_dns_write:
      enabled: true
      cursor_key_ref: aws/route53-dns-cursor
      mutation_receipt_key_ref: aws/route53-dns-mutation
      operation_timeout_secs: 60
      global_concurrency: 4
      per_account_concurrency: 1
    route53_zone_lifecycle:
      enabled: true
      cursor_key_ref: aws/route53-dns-cursor
      lifecycle_token_key_ref: aws/route53-zone-lifecycle
      operation_timeout_secs: 60
      global_concurrency: 2
      per_account_concurrency: 1
    cloudfront:
      read_enabled: true
      write_enabled: true
      fingerprint_key_ref: aws/cloudfront-fingerprint
      operation_timeout_secs: 60
      global_concurrency: 4
      per_account_concurrency: 1
    aws_waf:
      read_enabled: true
      write_enabled: true
      attach_enabled: true
      detach_enabled: true
      security_weaken_enabled: false
      ownership_hmac_key_ref: aws/waf-owner
      account_wcu_ceiling: 1500
      operation_timeout_secs: 60
      global_concurrency: 4
      per_account_concurrency: 1
