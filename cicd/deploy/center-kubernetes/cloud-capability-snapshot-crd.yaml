apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgionprovidercapabilitysnapshots.center.edgion.io
spec:
  group: center.edgion.io
  names:
    kind: EdgionProviderCapabilitySnapshot
    plural: edgionprovidercapabilitysnapshots
    shortNames: [ecap]
    singular: edgionprovidercapabilitysnapshot
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [contractVersion, providerAccountId, scope]
              properties:
                contractVersion:
                  type: integer
                  format: int32
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                providerAccountId:
                  type: string
                  maxLength: 512
                  x-kubernetes-validations:
                    - rule: self != ''
                    - rule: self == oldSelf
                scope:
                  type: object
                  required: [scopeType]
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                  properties:
                    scopeType:
                      type: string
                      minLength: 1
                      maxLength: 32
                    region:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 128
                    resourceKind:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 64
                    providerAccountId:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 512
                    externalId:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 1024
            status:
              type: object
              nullable: true
              required: [lastDiscoveryEpoch]
              properties:
                lastDiscoveryEpoch:
                  type: integer
                  format: int64
                  minimum: 0.0
                  x-kubernetes-validations:
                    - rule: self >= 0
                authority:
                  type: object
                  nullable: true
                  required: [providerAccountGeneration, discoveryEpoch, discoveryToken]
                  properties:
                    providerAccountGeneration:
                      type: integer
                      format: int64
                      minimum: 1.0
                      x-kubernetes-validations:
                        - rule: self > 0
                    credentialRevision:
                      type: string
                      nullable: true
                      minLength: 1
                      maxLength: 512
                    discoveryEpoch:
                      type: integer
                      format: int64
                      minimum: 1.0
                      x-kubernetes-validations:
                        - rule: self > 0
                    discoveryToken:
                      type: string
                      minLength: 1
                      maxLength: 512
                snapshotJson:
                  type: string
                  nullable: true
                  maxLength: 524288
