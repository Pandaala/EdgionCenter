apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgioncloudoperations.center.edgion.io
spec:
  group: center.edgion.io
  names:
    kind: EdgionCloudOperation
    listKind: EdgionCloudOperationList
    plural: edgioncloudoperations
    singular: edgioncloudoperation
    shortNames: [eco]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Resource
          type: string
          jsonPath: .spec.resourceId
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - operationId
                - idempotencyKey
                - resourceId
                - resourceKind
                - action
                - desiredGeneration
                - requestedBy
                - steps
              properties:
                operationId:
                  type: string
                  maxLength: 128
                  x-kubernetes-validations:
                    - rule: self != ''
                    - rule: self == oldSelf
                idempotencyKey:
                  type: string
                  maxLength: 512
                  x-kubernetes-validations:
                    - rule: self != ''
                    - rule: self == oldSelf
                resourceId:
                  type: string
                  maxLength: 512
                  x-kubernetes-validations:
                    - rule: self != ''
                    - rule: self == oldSelf
                resourceKind:
                  type: string
                  enum:
                    - provider_account
                    - managed_zone
                    - dns_record_set
                    - domain_binding
                    - certificate_binding
                    - edge_application
                    - origin_pool
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                action:
                  type: string
                  enum: [reconcile, delete, import, inspect]
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                desiredGeneration:
                  type: integer
                  format: int64
                  minimum: 1
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                requestedBy:
                  type: string
                  maxLength: 512
                  x-kubernetes-validations:
                    - rule: self != ''
                    - rule: self == oldSelf
                deadlineUnixMs:
                  type: integer
                  format: int64
                  nullable: true
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                steps:
                  type: array
                  minItems: 1
                  maxItems: 128
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                  items:
                    type: object
                    required: [name, purpose, idempotencyKey]
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 128
                      purpose:
                        type: string
                        enum: [apply, compensate]
                      idempotencyKey:
                        type: string
                        minLength: 1
                        maxLength: 512
            status:
              type: object
              nullable: true
              required:
                - phase
                - cancelRequested
                - createdAtUnixMs
                - updatedAtUnixMs
                - steps
              properties:
                phase:
                  type: string
                  enum:
                    - pending
                    - running
                    - retry_scheduled
                    - cancel_requested
                    - succeeded
                    - failed
                    - cancelled
                    - unknown_outcome
                cancelRequested:
                  type: boolean
                createdAtUnixMs:
                  type: integer
                  format: int64
                updatedAtUnixMs:
                  type: integer
                  format: int64
                lease:
                  type: object
                  nullable: true
                  required: [holder, fencingToken, fencingEpoch, validUntilUnixMs]
                  properties:
                    holder:
                      type: string
                      maxLength: 253
                    fencingToken:
                      type: string
                      maxLength: 128
                    fencingEpoch:
                      type: integer
                      format: int64
                      minimum: 1
                    validUntilUnixMs:
                      type: integer
                      format: int64
                steps:
                  type: array
                  maxItems: 128
                  items:
                    type: object
                    required: [phase, attempt]
                    properties:
                      phase:
                        type: string
                        enum:
                          - pending
                          - running
                          - retry_scheduled
                          - succeeded
                          - failed
                          - cancelled
                          - unknown_outcome
                      attempt:
                        type: integer
                        format: int32
                        minimum: 0
                      executionToken:
                        type: string
                        maxLength: 128
                        nullable: true
                      nextAttemptAtUnixMs:
                        type: integer
                        format: int64
                        nullable: true
                      startedAtUnixMs:
                        type: integer
                        format: int64
                        nullable: true
                      finishedAtUnixMs:
                        type: integer
                        format: int64
                        nullable: true
                      summary:
                        type: string
                        maxLength: 2048
                        nullable: true
                      error:
                        type: object
                        nullable: true
                        required: [kind, code, message]
                        properties:
                          kind:
                            type: string
                            enum:
                              - transient
                              - throttled
                              - conflict_requires_replan
                              - permanent
                              - unknown_outcome
                          code:
                            type: string
                            maxLength: 128
                          message:
                            type: string
                            maxLength: 2048
                          retryAfterMs:
                            type: integer
                            format: int64
                            minimum: 0
                            nullable: true
