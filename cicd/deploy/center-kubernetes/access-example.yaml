# Example OIDC authorization. Replace issuer/group values with the exact
# length-delimited identities documented by Edgion Center for your issuer.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: edgion-center-controller-reader
rules:
  - apiGroups: [center.edgion.io]
    resources: [edgioncontrollers]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edgion-center-controller-reader
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: edgion-center-controller-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-api-reader
rules:
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/server-info
      - /edgion-center-authz/api/v1/controllers
      - /edgion-center-authz/api/v1/clusters
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-api-reader
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-api-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-provider-account-reader
rules:
  # ProviderAccount responses expose credential aliases and identity selectors.
  # Keep this high-trust read separate from general Center API observation.
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloud/provider-accounts
      - /edgion-center-authz/api/v1/center/cloud/provider-accounts/*
      - /edgion-center-authz/permissions/provider-accounts:read
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-provider-account-reader
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-cloud-account-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-provider-account-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-provider-capability-reader
rules:
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloud/provider-capabilities/accounts/*
      - /edgion-center-authz/permissions/provider-capabilities:read
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-provider-capability-reader
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-capability-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-provider-capability-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-provider-account-writer
rules:
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloud/provider-accounts
    verbs: [post]
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloud/provider-accounts/*
    verbs: [put]
  - nonResourceURLs:
      - /edgion-center-authz/permissions/provider-credentials:use
      - /edgion-center-authz/permissions/provider-accounts:write
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-provider-account-writer
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-cloud-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-provider-account-writer
---
# Example least-privilege Cloudflare remote-control caller. Replace the account, Zone ID,
# record type, and subject with the exact binding used by your automation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-cloudflare-dns-remote-writer
rules:
  # Read the exact RRset first to obtain the current revision used by the guarded remote PUT.
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloudflare/dns/accounts/cf-main/zones/0123456789abcdef0123456789abcdef/record-sets/A
    verbs: [get]
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/cloudflare/dns/accounts/cf-main/zones/0123456789abcdef0123456789abcdef/record-sets/A/remote-control
    verbs: [put]
  - nonResourceURLs:
      - /edgion-center-authz/permissions/cloudflare-dns:read
      - /edgion-center-authz/permissions/cloudflare-dns:remote-write
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-cloudflare-dns-remote-writer
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-dns-automation
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-cloudflare-dns-remote-writer
---
# Example least-privilege Route 53 inventory reader. Replace the account and Zone ID with the
# exact ProviderAccount binding exposed to this group.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgion-center-route53-dns-reader
rules:
  - nonResourceURLs:
      - /edgion-center-authz/api/v1/center/aws/route53/accounts/aws-main/hosted-zones
      - /edgion-center-authz/api/v1/center/aws/route53/accounts/aws-main/hosted-zones/Z0123456789ABCDEF
      - /edgion-center-authz/api/v1/center/aws/route53/accounts/aws-main/hosted-zones/Z0123456789ABCDEF/record-sets
      - /edgion-center-authz/api/v1/center/aws/route53/accounts/aws-main/hosted-zones/Z0123456789ABCDEF/record-sets/A
    verbs: [get]
  - nonResourceURLs:
      - /edgion-center-authz/permissions/route53-dns:read
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgion-center-route53-dns-reader
subjects:
  - kind: Group
    name: oidc:34:https://issuer.example/realms/main:group:edgion-route53-readers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edgion-center-route53-dns-reader
