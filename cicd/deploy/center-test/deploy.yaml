---
# === Controller 1 Test Data ===
# ctrl-01 / cluster-east / primary / myRegion: region-a
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-1-data
  namespace: edgion-test
data:
  01_EdgionPlugins_global-service.yaml: |
    apiVersion: edgion.io/v1
    kind: EdgionPlugins
    metadata:
      name: global-service
      namespace: edgion-default
    spec:
      requestPlugins:
        - type: RegionRoute
          config:
            baseInfo:
              serviceGroup: global-service
              clusterType: primary
              cluster: cluster-east
              myRegion: region-a
              regions:
                - name: region-a
                  hashRange: [0, 333]
                  backendEndpoint: "127.0.0.1:30001"
                  tls: false
                - name: region-b
                  hashRange: [334, 666]
                  backendEndpoint: "127.0.0.1:30002"
                  tls: false
                - name: region-c
                  hashRange: [667, 999]
                  backendEndpoint: "127.0.0.1:30003"
                  tls: false
            keyGet:
              - type: header
                name: X-Account-Id
            routeRules:
              - type: RouteByDirectRegion
                keyFrom:
                  - type: header
                    name: X-Direct-Region
              - type: RouteByHashRange
  01_EdgionPlugins_payment-service.yaml: |
    apiVersion: edgion.io/v1
    kind: EdgionPlugins
    metadata:
      name: payment-service
      namespace: edgion-default
    spec:
      requestPlugins:
        - type: RegionRoute
          config:
            baseInfo:
              serviceGroup: payment-service
              clusterType: primary
              cluster: cluster-east
              myRegion: region-a
              regions:
                - name: region-a
                  hashRange: [0, 333]
                  backendEndpoint: "127.0.0.1:30001"
                  tls: false
                  failoverTo: region-b
                - name: region-b
                  hashRange: [334, 666]
                  backendEndpoint: "127.0.0.1:30002"
                  tls: false
                - name: region-c
                  hashRange: [667, 999]
                  backendEndpoint: "127.0.0.1:30003"
                  tls: false
            keyGet:
              - type: header
                name: X-User-Id
            routeRules:
              - type: RouteByHashRange
  01_EdgionPlugins_region-route-main.yaml: |
    apiVersion: edgion.io/v1
    kind: EdgionPlugins
    metadata:
      name: region-route-main
      namespace: edgion-default
    spec:
      requestPlugins:
        - type: RegionRoute
          config:
            baseInfo:
              serviceGroup: "region-route-test"
              clusterType: primary
              cluster: "test"
              regions:
                - name: virginia
                  hashRange: [0, 599]
                  backendEndpoint: "127.0.0.1:30001"
                  tls: false
                - name: ohio
                  hashRange: [600, 999]
                  backendEndpoint: "127.0.0.1:30002"
                  tls: false
            keyGet:
              - type: header
                name: X-Account-Id
              - type: cookie
                name: account_id
            hashKeyGet:
              - type: cookie
                name: x_region_hash
            hashCalc:
              algorithm: crc32
              modulo: 1000
              writeBack:
                - type: responseHeader
                  name: X-Region-Hash
            routeRules:
              - type: RouteByDirectRegion
                keyFrom:
                  - type: header
                    name: X-Direct-Region
              - type: RouteByKeyConfMatch
                matchMap:
                  "vip-va": virginia
                  "vip-oh": ohio
              - type: RouteByHashRange
  01_EdgionPlugins_region-route-myregion.yaml: |
    apiVersion: edgion.io/v1
    kind: EdgionPlugins
    metadata:
      name: region-route-myregion
      namespace: edgion-default
    spec:
      requestPlugins:
        - type: RegionRoute
          config:
            baseInfo:
              serviceGroup: "region-route-myregion"
              clusterType: primary
              cluster: "test"
              regions:
                - name: virginia
                  hashRange: [0, 333]
                  backendEndpoint: "127.0.0.1:30001"
                  tls: false
                - name: ohio
                  hashRange: [334, 666]
                  backendEndpoint: "127.0.0.1:30002"
                  tls: false
                  failoverTo: virginia
                - name: europe
                  hashRange: [667, 999]
                  backendEndpoint: "127.0.0.1:30002"
                  tls: false
                  failoverTo: ohio
              myRegion: virginia
            routeRules:
              - type: RouteByDirectRegion
                keyFrom:
