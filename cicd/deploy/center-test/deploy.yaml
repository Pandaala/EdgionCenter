apiVersion: v1
kind: Namespace
metadata:
  name: edgion-test

---
# === Controller 1 Config (cluster-east) ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-1-config
  namespace: edgion-test
data:
  edgion-controller.yaml: |
    work_dir: /tmp/edgion

    server:
      grpc_listen: 0.0.0.0:12151
      admin_listen: 0.0.0.0:12101

    conf_center:
      type: file_system
      conf_dir: /edgion/data

    center:
      address: https://center:12251
      name: ctrl-01
      cluster: cluster-east
      env: [testing]
      tag: [team-a]
      ping_interval_secs: 5
      rbac:
        allow:
          - verbs: ["*"]
            kinds: ["*"]
      security:
        active: fed
        certs:
          - name: fed
            cert: /edgion/tls/controller-1.crt
            key: /edgion/tls/controller-1.key
            ca: /edgion/tls/ca.crt

    logging:
      log_level: info
      console: true

    conf_sync:
      no_sync_kinds: [ReferenceGrant, Secret]

---
# === Controller 2 Config (cluster-west) ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-2-config
  namespace: edgion-test
data:
  edgion-controller.yaml: |
    work_dir: /tmp/edgion

    server:
      grpc_listen: 0.0.0.0:12151
      admin_listen: 0.0.0.0:12101

    conf_center:
      type: file_system
      conf_dir: /edgion/data

    center:
      address: https://center:12251
      name: ctrl-02
      cluster: cluster-west
      env: [testing]
      tag: [team-b]
      ping_interval_secs: 5
      rbac:
        allow:
          - verbs: ["*"]
            kinds: ["*"]
      security:
