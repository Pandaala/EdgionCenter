            cert: /edgion/tls/controller-2.crt
            key: /edgion/tls/controller-2.key
            ca: /edgion/tls/ca.crt

    logging:
      log_level: info
      console: true

    conf_sync:
      no_sync_kinds: [ReferenceGrant, Secret]

---
# === Center Config ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: center-config
  namespace: edgion-test
data:
  edgion-center.yaml: |
    server:
      grpc_addr: 0.0.0.0:12251
      http_addr: 0.0.0.0:12201
      probe_addr: 0.0.0.0:12200
      metrics_addr: 0.0.0.0:12290

    sync:
      command_timeout_secs: 30
      ping_interval_secs: 5

    database:
      enabled: true
      backend: sqlite
      sqlite_path: /edgion/data/center.db

    authz:
      mode: rbac

    db_auth:
      enabled: true
      jwt_secret: integration_test_jwt_secret_do_not_reuse_production_abc
      jwt_expiry_hours: 24
      cookie_secure: false

    audit:
      enabled: true
      log_reads: true
      retention_days: 0

    grpc_security:
      active: fed
      certs:
        - name: fed
          cert: /edgion/tls/server.crt
          key: /edgion/tls/server.key
          ca: /edgion/tls/ca.crt

    peer_identity:
      trust_domain: edgion.io

    local_auth:
      enabled: true
      username: admin
      # test-only credential; production deployments should configure stronger
      # passwords via Secret. Center no longer auto-injects default creds
      # (fix #01 / Task 4), so an explicit password is required here.
      password: test_password_123
      jwt_secret: integration_test_jwt_secret_do_not_reuse_production_abc
      jwt_expiry_hours: 24
      cookie_secure: false
      skip_paths: [/health, /ready, /api/v1/server-info]

---
# === Center persistent test data ===
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: center-data
  namespace: edgion-test
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 256Mi

---
# === Center Service (Controllers connect here via DNS name "center") ===
apiVersion: v1
kind: Service
metadata:
  name: center
  namespace: edgion-test
spec:
  selector:
    app: edgion-center
  ports:
    - name: grpc
      port: 12251
      targetPort: 12251
    - name: http
      port: 12201
      targetPort: 12201
    - name: probe
      port: 12200
      targetPort: 12200
    - name: metrics
      port: 12290
      targetPort: 12290

---
# === Center Pod ===
apiVersion: v1
kind: Pod
metadata:
  name: center
  namespace: edgion-test
  labels:
    app: edgion-center
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: center
      image: edgion-center-standalone:local
      imagePullPolicy: Never
      args: ["-c", "/edgion/config/edgion-center.yaml"]
      env:
        - name: EDGION_ADMIN_USERNAME
          value: admin
        - name: EDGION_ADMIN_PASSWORD
          value: test_password_123
      ports:
        - containerPort: 12251
          name: grpc
        - containerPort: 12201
          name: http
        - containerPort: 12200
          name: probe
        - containerPort: 12290
          name: metrics
      volumeMounts:
        - name: config
          mountPath: /edgion/config/edgion-center.yaml
          subPath: edgion-center.yaml
        - name: federation-tls
          mountPath: /edgion/tls
          readOnly: true
        - name: data
          mountPath: /edgion/data
  volumes:
    - name: config
      configMap:
        name: center-config
    - name: federation-tls
      secret:
        secretName: center-test-federation-tls
    - name: data
      persistentVolumeClaim:
        claimName: center-data

---
# === Controller 1 Pod ===
apiVersion: v1
kind: Pod
metadata:
  name: controller-1
  namespace: edgion-test
  labels:
    app: edgion-controller
    instance: ctrl-01
spec:
  initContainers:
    - name: init-data
      image: edgion-all:local
      imagePullPolicy: Never
      command: ['sh', '-c', 'mkdir -p /edgion/data/edgion-default; for src in /init-data/*.yaml; do name=${src##*/}; name=${name#01_EdgionPlugins_}; cp "$src" "/edgion/data/edgion-default/EdgionPlugins_edgion-default_$name"; done; echo done']
      volumeMounts:
        - name: init-data
          mountPath: /init-data
        - name: data
          mountPath: /edgion/data
        - name: federation-tls
          mountPath: /edgion/tls
          readOnly: true
  containers:
    - name: controller
      image: edgion-all:local
      imagePullPolicy: Never
      command: ["edgion-controller"]
      args: ["-c", "/edgion/config/edgion-controller.yaml"]
      ports:
        - containerPort: 12151
          name: grpc
        - containerPort: 12101
          name: http
      volumeMounts:
        - name: config
          mountPath: /edgion/config/edgion-controller.yaml
          subPath: edgion-controller.yaml
        - name: data
          mountPath: /edgion/data
        - name: federation-tls
          mountPath: /edgion/tls
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: controller-1-config
    - name: init-data
      configMap:
        name: controller-1-data
    - name: data
      emptyDir: {}
    - name: federation-tls
      secret:
        secretName: center-test-federation-tls

