# ================================================================================
# Edgion Center Configuration File
# ================================================================================
#
# Usage:
#   ./edgion-center --config-file config/edgion-center.yaml
#
# ================================================================================

server:
  # gRPC listen address for federation sync (Controller → Center)
  grpc_addr: "0.0.0.0:12251"
  # HTTP listen address for Admin API
  http_addr: "0.0.0.0:12201"
  # Liveness/readiness probe listen address (serves /health and /ready only)
  probe_addr: "0.0.0.0:12200"
  # Prometheus metrics listen address (independent listener)
  metrics_addr: "0.0.0.0:12290"

sync:
  # How often to send ListRequest to each controller (seconds, default: 300 = 5min)
  list_interval_secs: 300
  # Timeout waiting for ListResponse (seconds, default: 30)
  list_timeout_secs: 30
  # Timeout waiting for CommandResponse (seconds, default: 30)
  command_timeout_secs: 30
  # Heartbeat ping interval sent to controllers (seconds, default: 30)
  ping_interval_secs: 30

# ============================================================================
# Admin API Authentication
# ============================================================================
# Authentication is mandatory. Configure a `local_auth` or `auth` provider;
# omitting one leaves business routes returning 503 until configured.
#
# auth:
#   enabled: true
#   discovery: "https://your-idp.example.com/.well-known/openid-configuration"

# ============================================================================
# Federation gRPC Channel Security (mTLS)
# ============================================================================
# Omit this section entirely to keep plaintext gRPC (backward compatible).
# When configured, Center requires valid client certificates from Controllers.
#
# --- Option A: Legacy single-cert format (backward compatible) ---
# grpc_security:
#   tls:
#     cert: certs/grpc/server.crt   # Center server certificate
#     key: certs/grpc/server.key    # Center server private key
#     ca: certs/grpc/ca.crt         # CA certificate (verifies Controller client cert)
#     skip_tls: false               # Emergency bypass: true = skip TLS (INSECURE)
#
# --- Option B: Multi-cert format (supports cert rotation / CA migration) ---
# grpc_security:
#   active: primary               # Name of the active cert set
#   certs:
#     - name: primary
#       cert: certs/grpc/primary/server.crt
#       key: certs/grpc/primary/server.key
#       ca: certs/grpc/primary/ca.crt
#     - name: new-ca
#       cert: certs/grpc/new-ca/server.crt
#       key: certs/grpc/new-ca/server.key
#       ca: certs/grpc/new-ca/ca.crt
