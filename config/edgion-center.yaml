# ================================================================================
# Edgion Center Configuration File
# ================================================================================
#
# Usage:
#   ./target/release/edgion-center-standalone --config-file config/edgion-center.yaml
#
# ================================================================================

server:
  # gRPC listen address for federation sync (Controller → Center)
  grpc_addr: "0.0.0.0:12251"
  # HTTP listen address for Admin API
  http_addr: "0.0.0.0:12201"
  # Liveness/readiness probe listen address (serves /health and /ready only)
  probe_addr: "0.0.0.0:12200"
  # Prometheus metrics listen address (independent listener)
  metrics_addr: "0.0.0.0:12290"

sync:
  # How often to send ListRequest to each controller (seconds, default: 300 = 5min)
  list_interval_secs: 300
  # Timeout waiting for ListResponse (seconds, default: 30)
  list_timeout_secs: 30
  # Timeout waiting for CommandResponse (seconds, default: 30)
  command_timeout_secs: 30
  # Heartbeat ping interval sent to controllers (seconds, default: 30)
  ping_interval_secs: 30

# ============================================================================
# Access control — three orthogonal axes (full reference:
# skills/02-features/access-control.md)
# ============================================================================
# Access control is NOT a single "mode" anymore. It is three independent axes
# that combine freely:
#
#   1. Authentication — WHO you are. Any subset of three providers, all active
#      simultaneously:
#        - OIDC / Okta            (`auth:`)
#        - single shared admin    (`local_auth:`)
#        - DB-backed users        (`db_auth.enabled`)
#   2. Authorization — WHAT you may do (`authz.mode`): `allow_all` (default) or
#      `rbac`.
#   3. Storage — WHERE state lives (`database.backend`): `sqlite` or `mysql`.
#
# The defaults below (authz.mode = allow_all, db_auth disabled) reproduce the
# old lightweight "login = admin" behavior. Turn on `rbac` and/or `db_auth` for
# per-user, database-driven permissions.

# ----------------------------------------------------------------------------
# Authorization (`authz:`)
# ----------------------------------------------------------------------------
# Selects which authorization store is installed. Orthogonal to authentication:
# whichever provider issued the token, RBAC resolves permissions from the DB by
# the authenticated subject.
#
#   allow_all (default) — Every authenticated caller is a full admin (no
#                         per-user permissions). The audit log still attributes
#                         actions to the caller.
#   rbac                — Database-backed page + API RBAC. Permissions resolved
#                         per subject from the `users`/`roles` tables, managed
#                         from the dashboard (Users + Roles pages). REQUIRES a
#                         usable database (see `database:` below) — startup fails
#                         without one. Identities with no matching `users` row
#                         get ZERO permissions (403 everywhere): fail-closed, no
#                         default role. Permission changes take up to ~30s to
#                         apply (authz cache TTL).
authz:
  mode: allow_all
  # mode: rbac

# ============================================================================
# Persistence (`database:`)
# ============================================================================
# Backing store for the controller registry, audit log, and (under rbac /
# db_auth) the users/roles tables. The `backend` defaults to SQLite. Both
# `authz.mode: rbac` and `db_auth.enabled: true` REQUIRE a usable database and
# refuse to start without one (MySQL is recommended at scale, but is never
# selected automatically).
database:
  enabled: true
  # Storage backend: sqlite (default, embedded) or mysql (external).
  backend: sqlite
  # SQLite file path (used when backend = sqlite). Relative paths resolve from
  # the working directory.
  sqlite_path: "data/center.db"
  #
  # --- External MySQL ---
  # backend: mysql
  # mysql_url: "mysql://user:pass@host:3306/edgion_center"

# Mounted cloud credentials are an explicit, default-off deployment capability.
# Enabling this only constructs a local resolver. Cloud-provider traffic still
# requires the separate provider-specific inspection switch below.
# mounted_credentials:
#   enabled: true
#   root_directory: /var/run/edgion-center/cloud-credentials
#   revision_key_file: revision.key
#   bindings:
#     - credential_ref: cloudflare/main
#       provider_account_id: cf-main
#       provider: cloudflare
#       purpose: cloudflare_api_token
#       file: cloudflare-api-token
#     - credential_ref: cloudflare/dns-cursor-a
#       provider_account_id: cf-main
#       provider: cloudflare
#       purpose: cloudflare_dns_cursor_hmac
#       file: cloudflare-dns-cursor-a.key
#     - credential_ref: cloudflare/dns-cursor-b
#       provider_account_id: cf-main
#       provider: cloudflare
#       purpose: cloudflare_dns_cursor_hmac
#       file: cloudflare-dns-cursor-b.key

# Cloudflare inspection is independently default-off. When enabled it exposes
# the existing credential-inspection API and, only on an authorized inspection
# request, verifies the token and issues an account-scoped one-item zone query.
# It requires database.enabled and mounted_credentials.enabled. The production
# endpoint is fixed to https://api.cloudflare.com; no endpoint override exists.
# cloudflare_credential_inspection:
#   enabled: true

# Read-only Cloudflare DNS inventory is independently default-off. Cursor keys are separate exact
# 32-byte deployment secrets shared by all replicas. `cursor_key_ref` signs new cursors; the
# optional fallback only verifies cursors during rotation. `cloudflare-dns:read` is a high-trust
# permission for every configured Cloudflare account. The production endpoint is fixed.
# cloudflare_dns_read:
#   enabled: true
#   cursor_key_ref: cloudflare/dns-cursor-a
#   cursor_fallback_key_ref: cloudflare/dns-cursor-b
#   cursor_max_lifetime_secs: 900
#   cursor_clock_skew_secs: 30
#   operation_timeout_secs: 30
#   global_concurrency: 16
#   per_account_concurrency: 2

# Synchronous Cloudflare DNS writes are independently default-off. They use only the API token
# already referenced by the target ProviderAccount. No cursor or mutation-token key is resolved,
# no durable operation is created, and provider mutations are never retried automatically.
# cloudflare_dns_write:
#   enabled: true
#   operation_timeout_secs: 30
#   global_concurrency: 4
#   per_account_concurrency: 1

# Cloudflare Zone WAF inventory and mutations are independently default-off, and reuse only the
# API-token binding of the exact target ProviderAccount. The service constructs no client and makes
# no provider request at startup. A mutation is a single synchronous attempt: an ambiguous result
# is reported as unknown_outcome and must be resolved by reading the Zone WAF inventory.
# cloudflare_waf:
#   read_enabled: true
#   write_enabled: true
#   ownership_key_ref: cloudflare/waf-owner-a
#   ownership_fallback_key_ref: cloudflare/waf-owner-b
#   operation_timeout_secs: 30
#   global_concurrency: 4
#   per_account_concurrency: 1

# ============================================================================
# Audit log (`audit:`)
# ============================================================================
# Records who did what, when, from where, and with what result. Requires
# `database.enabled = true` (with no database, audit logging is skipped and a
# WARN is logged at startup). The dashboard Audit page reads
# GET /api/v1/center/admin/audit-logs.
audit:
  # Enabled by default when the database is enabled.
  enabled: true
  # Record read (GET) requests too. Mutations are always recorded when enabled;
  # reads are recorded only when this is true.
  log_reads: false
  # Retention window in days; 0 = keep records indefinitely.
  # KNOWN LIMITATION: pruning is not yet scheduled, so `retention_days` has no
  # runtime effect today — records are never auto-deleted regardless of value.
  retention_days: 0

# ============================================================================
# Admin API Authentication — three providers, freely combined
# ============================================================================
# Authentication is mandatory. Enable ANY subset of the three providers below;
# they coexist (all active simultaneously). With NONE enabled, business routes
# fail-close with 503 until configured (`/health`, `/ready`, `/metrics`,
# `/api/v1/auth/status` stay reachable). A unified `POST /api/v1/auth/login`
# authenticates DB users first, then the single shared admin.
#
# Session-secret precedence (required for ANY password login — single admin
# and/or db_auth): `local_auth.jwt_secret` is used if set, otherwise
# `db_auth.jwt_secret`. If a password-login provider is enabled but NEITHER
# secret is set, startup fails. OIDC (`auth:`) needs no session secret.
#
# --- OIDC / Okta (`auth:`) ---
# SSO login via an OIDC provider. Coexists with rbac and db_auth (no
# force-disable). Under rbac, the OIDC subject (`sub`) must already have a
# matching `users` row, or it gets zero permissions (403 everywhere).
#
# auth:
#   enabled: true
#   discovery: "https://your-idp.example.com/.well-known/openid-configuration"
#   audiences: ["edgion-admin"]   # optional; empty = skip audience check
#   ca_file: /var/run/secrets/oidc/ca.crt  # optional private OIDC CA bundle
#
# --- Single shared admin (`local_auth:`) ---
# One username + password plus the JWT signing secret. The `jwt_secret` here is
# also the preferred session secret for db_auth tokens (see precedence above).
#
# local_auth:
#   username: "admin"
#   password: "change-me"
#   jwt_secret: "change-me-in-production"   # preferred session secret
#   jwt_expiry_hours: 24
#   cookie_secure: true
#
# --- DB-backed users (`db_auth:`) ---
# Username + bcrypt-password accounts stored in the `users` table. REQUIRES a
# usable database (startup fails without one). `jwt_secret` here is used only
# when `local_auth.jwt_secret` is unset. `jwt_expiry_hours` / `cookie_secure`
# apply on the DB-users-only path (when no `local_auth` admin supplies them).
# Typically paired with `authz.mode: rbac` for per-user permissions, but it also
# works under allow_all (any authenticated DB user is a full admin).
#
# db_auth:
#   enabled: true
#   jwt_secret: "change-me-in-production"   # used only if local_auth.jwt_secret is unset
#   jwt_expiry_hours: 24
#   cookie_secure: true
#
# --- First-run admin bootstrap (db_auth) ---
# When `db_auth.enabled` is true AND the `users` table is empty, set BOTH env
# vars to create the initial admin user:
#   EDGION_ADMIN_USERNAME=admin
#   EDGION_ADMIN_PASSWORD=<strong-password>
# Under rbac this also creates a built-in `admin` role holding every permission
# key, bound to that user. If either var is unset, a WARN is logged and no DB
# user can log in until one is provisioned.

# ============================================================================
# Federation gRPC Channel Security (mTLS)
# ============================================================================
# This section is mandatory. Federation is mTLS-only and startup fails closed
# when the server certificate, key, CA, or peer trust domain is absent.
#
# --- Option A: Single-cert format ---
# grpc_security:
#   tls:
#     cert: certs/grpc/server.crt   # Center server certificate
#     key: certs/grpc/server.key    # Center server private key
#     ca: certs/grpc/ca.crt         # CA certificate (verifies Controller client cert)
#     skip_tls: false               # Must remain false; plaintext is unsupported
#
# --- Option B: Multi-cert format (supports cert rotation / CA migration) ---
# grpc_security:
#   active: primary               # Name of the active cert set
#   certs:
#     - name: primary
#       cert: certs/grpc/primary/server.crt
#       key: certs/grpc/primary/server.key
#       ca: certs/grpc/primary/ca.crt
#     - name: new-ca
#       cert: certs/grpc/new-ca/server.crt
#       key: certs/grpc/new-ca/server.key
#       ca: certs/grpc/new-ca/ca.crt
#
# peer_identity:
#   trust_domain: edgion.io         # Controller SPIFFE trust domain (required)
