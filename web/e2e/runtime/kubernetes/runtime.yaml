---
apiVersion: apps/v1
kind: Deployment
metadata: {name: "__PREFIX__-oauth2-proxy", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec:
    replicas: 1
    selector: {matchLabels: {app: "__PREFIX__-oauth2-proxy"}}
    template:
      metadata: {labels: {app: "__PREFIX__-oauth2-proxy", edgion.io/e2e-run: "__RUN_ID__"}}
      spec:
        containers:
          - name: oauth2-proxy
            image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
            args: [--provider=oidc, "--oidc-issuer-url=https://__PREFIX__-dex.__PREFIX__-system.svc.cluster.local:5556/dex", --provider-ca-file=/tls/ca.crt, --client-id=edgion-e2e, --redirect-url=http://127.0.0.1:14180/oauth2/callback, --upstream=http://__PREFIX__-center:12201, --http-address=0.0.0.0:4180, --email-domain=*, --scope=openid profile email groups, --code-challenge-method=S256, --skip-provider-button=true, --pass-authorization-header=true, --pass-access-token=false, --cookie-secure=false]
            env:
              - {name: OAUTH2_PROXY_CLIENT_SECRET, valueFrom: {secretKeyRef: {name: "__PREFIX__-oauth-credentials", key: client-secret}}}
              - {name: OAUTH2_PROXY_COOKIE_SECRET, valueFrom: {secretKeyRef: {name: "__PREFIX__-oauth-credentials", key: cookie-secret}}}
            volumeMounts: [{name: tls, mountPath: /tls, readOnly: true}]
            readinessProbe: {httpGet: {path: /ping, port: 4180}, periodSeconds: 2, failureThreshold: 30}
        volumes: [{name: tls, secret: {secretName: "__PREFIX__-oauth-oidc-ca"}}]
---
apiVersion: v1
kind: Service
metadata: {name: "__PREFIX__-oauth2-proxy", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec: {selector: {app: "__PREFIX__-oauth2-proxy"}, ports: [{port: 80, targetPort: 4180}]}
