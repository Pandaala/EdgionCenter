apiVersion: v1
kind: ConfigMap
metadata: {name: "__PREFIX__-runtime-config", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
data:
  center.yaml: |
    server: {grpc_addr: "0.0.0.0:12251", http_addr: "0.0.0.0:12201", probe_addr: "0.0.0.0:12200", metrics_addr: "0.0.0.0:12290"}
    auth: {enabled: true, discovery: "https://__PREFIX__-dex.__PREFIX__-system.svc.cluster.local:5556/dex/.well-known/openid-configuration", audiences: [edgion-e2e], ca_file: /tls/oidc/ca.crt}
    grpc_security: {active: fed, certs: [{name: fed, cert: /tls/federation/server.crt, key: /tls/federation/server.key, ca: /tls/federation/ca.crt}]}
    trust_domain: edgion.io
    internal_forwarding:
      bind_addr: "0.0.0.0:12252"
      port: 12252
      server_name: "__PREFIX__-center-internal.__PREFIX__-system.svc"
      expected_peer_spiffe_id: "spiffe://edgion.io/ns/__PREFIX__-system/sa/__PREFIX__-center-service-account"
      tls: {cert: /tls/internal/tls.crt, key: /tls/internal/tls.key, ca: /tls/internal/ca.crt}
  controller-a.yaml: |
    work_dir: /tmp/edgion
    server: {grpc_listen: "0.0.0.0:12151", admin_listen: "0.0.0.0:12101", probe_listen: "0.0.0.0:12100"}
    conf_center:
      type: kubernetes
      gateway_class: "__PREFIX__-class"
      controller_name: edgion.io/gateway-controller
      watch_namespaces: ["__NS_A__", "__NS_B__", "__NS_DENIED__"]
      leader_election: {lease_name: "__PREFIX__-controller-a", lease_namespace: "__PREFIX__-system"}
    center:
      address: "https://__PREFIX__-center.__PREFIX__-system.svc:12251"
      name: "__E2E_CONTROLLER_A__"
      cluster: e2e-a
      rbac: {allow: [{verbs: ["*"], kinds: ["*"]}]}
      security: {active: fed, certs: [{name: fed, cert: /tls/controller.crt, key: /tls/controller.key, ca: /tls/ca.crt}]}
    logging: {log_level: info, console: true}
    conf_sync_security: {tls: {skip_tls: true}}
  controller-b.yaml: |
    work_dir: /tmp/edgion
    server: {grpc_listen: "0.0.0.0:12151", admin_listen: "0.0.0.0:12101", probe_listen: "0.0.0.0:12100"}
    conf_center:
      type: kubernetes
      gateway_class: "__PREFIX__-class"
      controller_name: edgion.io/gateway-controller
      watch_namespaces: ["__NS_A__", "__NS_B__", "__NS_DENIED__"]
      leader_election: {lease_name: "__PREFIX__-controller-b", lease_namespace: "__PREFIX__-system"}
    center:
      address: "https://__PREFIX__-center.__PREFIX__-system.svc:12251"
      name: "__E2E_CONTROLLER_B__"
      cluster: e2e-b
      rbac: {allow: [{verbs: ["*"], kinds: ["*"]}]}
      security: {active: fed, certs: [{name: fed, cert: /tls/controller.crt, key: /tls/controller.key, ca: /tls/ca.crt}]}
    logging: {log_level: info, console: true}
    conf_sync_security: {tls: {skip_tls: true}}
  dex.yaml: |
    issuer: https://__PREFIX__-dex.__PREFIX__-system.svc.cluster.local:5556/dex
    storage: {type: memory}
    web: {https: 0.0.0.0:5556, tlsCert: /tls/tls.crt, tlsKey: /tls/tls.key}
    staticClients: [{id: edgion-e2e, name: Edgion E2E, secretEnv: CLIENT_SECRET, redirectURIs: [http://127.0.0.1:14180/oauth2/callback]}]
    enablePasswordDB: true
    staticPasswords: [{email: "__E2E_USERNAME__", hash: "__E2E_PASSWORD_HASH__", username: "__E2E_USERNAME__", userID: "__PREFIX__-user"}]
---
apiVersion: v1
kind: Secret
metadata: {name: "__PREFIX__-dex-credentials", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
type: Opaque
stringData: {client-secret: "__OAUTH_CLIENT_SECRET__"}
---
apiVersion: v1
kind: Secret
metadata: {name: "__PREFIX__-oauth-credentials", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
type: Opaque
stringData: {client-secret: "__OAUTH_CLIENT_SECRET__", cookie-secret: "__COOKIE_SECRET__"}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: "__PREFIX__-center", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec:
  replicas: 1
  selector: {matchLabels: {app: "__PREFIX__-center"}}
  template:
    metadata: {labels: {app: "__PREFIX__-center", edgion.io/e2e-run: "__RUN_ID__"}}
    spec:
      serviceAccountName: "__PREFIX__-center-service-account"
      containers:
        - name: center
          image: "edgion-center-kubernetes:__RUN_ID__"
          args: [--config-file, /config/center.yaml]
          env:
            - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
            - {name: POD_UID, valueFrom: {fieldRef: {fieldPath: metadata.uid}}}
            - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
          ports: [{containerPort: 12200}, {containerPort: 12201}, {containerPort: 12251}, {containerPort: 12252}]
          readinessProbe: {httpGet: {path: /ready, port: 12200}, periodSeconds: 2, failureThreshold: 30}
          livenessProbe: {httpGet: {path: /health, port: 12200}, periodSeconds: 10}
          volumeMounts: [{name: config, mountPath: /config}, {name: federation-tls, mountPath: /tls/federation, readOnly: true}, {name: internal-tls, mountPath: /tls/internal, readOnly: true}, {name: oidc-ca, mountPath: /tls/oidc, readOnly: true}]
      volumes: [{name: config, configMap: {name: "__PREFIX__-runtime-config"}}, {name: federation-tls, secret: {secretName: "__PREFIX__-center-federation-tls"}}, {name: internal-tls, secret: {secretName: "__PREFIX__-center-internal-tls"}}, {name: oidc-ca, secret: {secretName: "__PREFIX__-center-oidc-ca"}}]
---
apiVersion: v1
kind: Service
metadata: {name: "__PREFIX__-center", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec: {selector: {app: "__PREFIX__-center"}, ports: [{name: http, port: 12201}, {name: grpc, port: 12251}]}
---
apiVersion: v1
kind: Service
metadata: {name: "__PREFIX__-center-internal", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec: {clusterIP: None, selector: {app: "__PREFIX__-center"}, ports: [{name: internal, port: 12252}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: "__PREFIX__-controller-a", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec:
  replicas: 1
  strategy: {type: RollingUpdate, rollingUpdate: {maxSurge: 0, maxUnavailable: 1}}
  selector: {matchLabels: {app: "__PREFIX__-controller-a"}}
  template:
    metadata: {labels: {app: "__PREFIX__-controller-a", edgion.io/e2e-run: "__RUN_ID__"}}
    spec:
      serviceAccountName: "__PREFIX__-controller-a-service-account"
      containers: [{name: controller, image: "pandaala/edgion-controller:__RUN_ID__", command: [/usr/local/bin/edgion-controller], args: [--config-file, /config/controller-a.yaml], env: [{name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}, {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}], readinessProbe: {httpGet: {path: /ready, port: 12100}, periodSeconds: 2, failureThreshold: 30}, livenessProbe: {httpGet: {path: /health, port: 12100}, periodSeconds: 10}, volumeMounts: [{name: config, mountPath: /config}, {name: tls, mountPath: /tls, readOnly: true}]}]
      volumes: [{name: config, configMap: {name: "__PREFIX__-runtime-config"}}, {name: tls, secret: {secretName: "__PREFIX__-controller-a-federation-tls"}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: "__PREFIX__-controller-b", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec:
  replicas: 1
  strategy: {type: RollingUpdate, rollingUpdate: {maxSurge: 0, maxUnavailable: 1}}
  selector: {matchLabels: {app: "__PREFIX__-controller-b"}}
  template:
    metadata: {labels: {app: "__PREFIX__-controller-b", edgion.io/e2e-run: "__RUN_ID__"}}
    spec:
      serviceAccountName: "__PREFIX__-controller-b-service-account"
      containers: [{name: controller, image: "pandaala/edgion-controller:__RUN_ID__", command: [/usr/local/bin/edgion-controller], args: [--config-file, /config/controller-b.yaml], env: [{name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}, {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}], readinessProbe: {httpGet: {path: /ready, port: 12100}, periodSeconds: 2, failureThreshold: 30}, livenessProbe: {httpGet: {path: /health, port: 12100}, periodSeconds: 10}, volumeMounts: [{name: config, mountPath: /config}, {name: tls, mountPath: /tls, readOnly: true}]}]
      volumes: [{name: config, configMap: {name: "__PREFIX__-runtime-config"}}, {name: tls, secret: {secretName: "__PREFIX__-controller-b-federation-tls"}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: "__PREFIX__-dex", namespace: "__PREFIX__-system", labels: {edgion.io/e2e-run: "__RUN_ID__"}}
spec: {replicas: 1, selector: {matchLabels: {app: "__PREFIX__-dex"}}, template: {metadata: {labels: {app: "__PREFIX__-dex", edgion.io/e2e-run: "__RUN_ID__"}}, spec: {containers: [{name: dex, image: ghcr.io/dexidp/dex:v2.41.1, args: [dex, serve, /config/dex.yaml], env: [{name: CLIENT_SECRET, valueFrom: {secretKeyRef: {name: "__PREFIX__-dex-credentials", key: client-secret}}}], readinessProbe: {httpGet: {scheme: HTTPS, path: /dex/.well-known/openid-configuration, port: 5556}, periodSeconds: 2, failureThreshold: 30}, volumeMounts: [{name: config, mountPath: /config}, {name: tls, mountPath: /tls, readOnly: true}]}], volumes: [{name: config, configMap: {name: "__PREFIX__-runtime-config"}}, {name: tls, secret: {secretName: "__PREFIX__-dex-tls"}}]}}}
