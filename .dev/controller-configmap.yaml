apiVersion: v1
kind: ConfigMap
metadata:
  name: edgion-controller-config
  namespace: edgion-system
  labels:
    app: edgion-controller
data:
  edgion-controller.yaml: |
    work_dir: /usr/local/edgion

    server:
      grpc_listen: 0.0.0.0:12151
      admin_listen: 0.0.0.0:12101
      probe_listen: 0.0.0.0:12100
      metrics_listen: 0.0.0.0:12190

    logging:
      log_dir: logs
      log_prefix: edgion-controller
      log_level: info
      json_format: true
      console: false
      buffer_size: 10000

    conf_center:
      type: kubernetes
      gateway_class: public-gateway
      controller_name: edgion.io/gateway-controller
      watch_namespaces: []
      ha_mode: leader-only

      leader_election:
        lease_name: edgion-controller-leader
        lease_namespace: edgion-system
        lease_duration_secs: 15
        retry_period_secs: 2

      metadata_filter:
        blocked_annotations:
          - kubectl.kubernetes.io/last-applied-configuration
          - meta.helm.sh/release-name
          - meta.helm.sh/release-namespace
        remove_managed_fields: true

    debug:
      enabled: false

    conf_sync:
      no_sync_kinds: [ReferenceGrant, Secret]
      default_capacity: 200

    # Federated Center connection (mTLS; controller forces https).
    center:
      address: "https://192.168.139.3:12251"
      name: "ctrl-orb"
      cluster: "orbstack-cluster"
      env: ["dev"]
      enabled: true
      ping_interval_secs: 10
      security:
        active: fed
        certs:
          - name: fed
            cert: /usr/local/edgion/certs/ctrl-orb.crt
            key: /usr/local/edgion/certs/ctrl-orb.key
            ca: /usr/local/edgion/certs/ca.crt
      # No rbac block: use the built-in default Center policy (read-only on all
      # resources + EdgionConfigData/RegionRoute federation writes + server-info).
