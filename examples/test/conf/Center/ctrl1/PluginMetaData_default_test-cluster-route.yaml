# ClusterRegionRoute PluginMetaData for center integration test — controller 1.
# Differs from controller 2 in two ways:
#   - myRegion=east (vs west)        → per-controller identity, NOT compared
#   - regions count = 2 (vs 3)        → triggers consistency check's regions.length conflict
# Test 5 (consistency_detect) expects a regions.length conflict.
apiVersion: edgion.io/v1
kind: PluginMetaData
metadata:
  name: test-cluster-route
  namespace: default
spec:
  metadata:
    type: ClusterRegionRoute
    config:
      myRegion: east
      regions:
        - name: east
          hashRange: [0, 499]
          backendEndpoint: "127.0.0.1:30001"
          tls: false
        - name: west
          hashRange: [500, 999]
          backendEndpoint: "127.0.0.1:30002"
          tls: false
      keyGet:
        - type: header
          name: X-User-Id
      routeRules:
        - type: RouteByDirectRegion
          keyFrom:
            - type: header
              name: X-Direct-Region
        - type: RouteByHashRange
